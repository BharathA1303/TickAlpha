name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: alphasync_user
          POSTGRES_PASSWORD: alphasync_password
          POSTGRES_DB: alphasync_data
        ports:
          - 5432:5432
        # Ensure postgres is healthy before continuing
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: alphasync_user
          POSTGRES_PASSWORD: alphasync_password
          POSTGRES_DB: alphasync_data
          REDIS_HOST: localhost
          JWT_SECRET: test_secret_key_1234567890_test_secret_key
          JWT_ALGORITHM: HS256
        run: |
          python -m pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to VPS Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            echo "Starting deploy..."
            # Navigate to directory (defaulting to /var/www/TickAlpha, update this if your path is different)
            cd ${{ secrets.DEPLOY_PATH || '/root/TickAlpha' }}
            
            # Fetch latest changes
            git fetch --all
            git reset --hard origin/main
            
            # Rebuild and restart docker containers
            docker compose down
            docker compose up -d --build
            
            # Clean unused images to save disk space
            docker image prune -f
            echo "Deployment finished successfully!"
